name: E2E

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    env:
      electron_config_cache: ${{ github.workspace }}/.electron-cache

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --mode=skip-build

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.electron-cache
          key: electron-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install Electron binary
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if node node_modules/electron/install.js; then
              exit 0
            fi
            echo "Electron install failed (attempt $attempt); retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Electron binary install failed after 5 attempts"
          exit 1

      - name: Run Playwright e2e
        if: runner.os != 'Linux'
        run: yarn test:e2e

      - name: Run Playwright e2e (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum yarn test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report
          retention-days: 7
